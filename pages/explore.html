<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Pulse — Explore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/app.css"/>
  <style>
    .explore-search-wrap { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .explore-search-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 30px; padding: 11px 18px;
      transition: border-color var(--trans), box-shadow var(--trans);
    }
    .explore-search-bar:focus-within { border-color: var(--pulse); box-shadow: 0 0 0 3px var(--pulse-dim); }
    .explore-search-bar input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: var(--ff-body); font-size: 15px;
    }
    .explore-search-bar input::placeholder { color: var(--dim); }
    .explore-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .explore-tab {
      flex: 1; padding: 13px; border: none; background: none;
      color: var(--muted); font-family: var(--ff-body); font-size: 14px; font-weight: 600;
      cursor: pointer; border-bottom: 2px solid transparent; transition: all var(--trans);
      -webkit-tap-highlight-color: transparent;
    }
    .explore-tab.active { color: var(--text); border-bottom-color: var(--pulse); }
  </style>
</head>
<body>
<div class="app-layout">
  <header class="mobile-topbar">
    <div class="topbar-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 28 28" fill="none">
          <path d="M4 18 Q8 4 14 14 Q20 24 24 10" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      Explore
    </div>
    <div class="topbar-right"></div>
  </header>
  <aside class="sidebar"></aside>
  <main class="main-col">
    <div class="main-header"><h1>Explore</h1></div>
    <div class="explore-search-wrap">
      <div class="explore-search-bar">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="explore-search" placeholder="Search people and pulses…" oninput="handleExploreSearch(this.value)"/>
      </div>
    </div>
    <div class="explore-tabs" id="explore-tabs">
      <button class="explore-tab active" onclick="switchExTab('posts',this)">Trending</button>
      <button class="explore-tab" onclick="switchExTab('people',this)">People</button>
    </div>
    <div id="explore-content">
      <div class="loading-state"><div class="spin"></div></div>
    </div>
  </main>
  <aside class="right-aside">
    <div class="aside-card">
      <div class="aside-title">Who to follow</div>
      <div id="aside-suggestions-list"><div class="loading-state" style="padding:16px 0"><div class="spin"></div></div></div>
    </div>
  </aside>
  <nav class="bottom-nav"></nav>
</div>
<script src="../js/api.js"></script>
<script src="../js/explore.js"></script>
</body>
</html>
