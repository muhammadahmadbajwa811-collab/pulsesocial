<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Pulse — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/app.css"/>
</head>
<body>
<div class="app-layout">

  <!-- Mobile top bar -->
  <header class="mobile-topbar">
    <div class="topbar-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 28 28" fill="none">
          <path d="M4 18 Q8 4 14 14 Q20 24 24 10" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      Pulse
    </div>
    <div class="topbar-right"></div>
  </header>

  <!-- Sidebar (filled by JS) -->
  <aside class="sidebar"></aside>

  <!-- Main -->
  <main class="main-col">
    <!-- Desktop header -->
    <div class="main-header">
      <h1>Home</h1>
      <div class="feed-tabs" style="border:none;margin-left:auto">
        <button class="feed-tab active" onclick="switchFeedTab('feed',this)">For You</button>
        <button class="feed-tab" onclick="switchFeedTab('explore',this)">Explore</button>
      </div>
    </div>

    <!-- Mobile feed tabs -->
    <div class="feed-tabs" id="mob-tabs">
      <button class="feed-tab active" onclick="switchFeedTab('feed',this)">For You</button>
      <button class="feed-tab" onclick="switchFeedTab('explore',this)">Explore</button>
    </div>

    <!-- Compose box -->
    <div class="compose-box" id="compose-box">
      <div id="compose-avatar"></div>
      <div class="compose-body">
        <textarea class="compose-textarea" id="compose-text" placeholder="What's pulsing through your mind?" maxlength="500" rows="3"></textarea>
        <div class="compose-footer">
          <span class="compose-count" id="char-count">500</span>
          <button class="btn-post" id="btn-post" onclick="submitPost()" disabled>Pulse it</button>
        </div>
      </div>
    </div>

    <!-- Feed -->
    <div id="feed-container">
      <div class="loading-state"><div class="spin"></div><p>Loading your feed…</p></div>
    </div>
  </main>

  <!-- Right aside -->
  <aside class="right-aside">
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Search people…" oninput="handleSearch(this.value)"/>
    </div>
    <div class="aside-card" id="search-card" style="display:none">
      <div class="aside-title">Results</div>
      <div id="search-results-list"></div>
    </div>
    <div class="aside-card">
      <div class="aside-title">Who to follow</div>
      <div id="aside-suggestions-list"><div class="loading-state" style="padding:16px 0"><div class="spin"></div></div></div>
    </div>
  </aside>

  <!-- Bottom nav (filled by JS) -->
  <nav class="bottom-nav"></nav>

</div>

<script src="../js/api.js"></script>
<script src="../js/feed.js"></script>
</body>
</html>
